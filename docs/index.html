<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tirzah Reader</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" href="css/reader.css">
</head>
<body>
  <div id="app"></div>

  <div id="gloss-popup" class="gloss-popup hidden">
    <div class="gloss-content">
      <div class="gloss-word"></div>
      <div class="gloss-definition"></div>
      <div class="gloss-chinese"></div>
      <div class="gloss-example"></div>
    </div>
  </div>

  <script>
    window.$docsify = {
      name: 'Tirzah Reader',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'home.md',
    }
  </script>

  <script src="js/glossing.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
